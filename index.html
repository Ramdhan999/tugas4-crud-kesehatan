<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Data Pasien - Glassmorphism</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --danger: #EF4444;
            --text: #1F2937;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            /* Gradien background biar efek kaca kelihatan */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            color: var(--text);
            padding: 40px 20px; 
            display: flex;
            justify-content: center;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            /* Efek Glassmorphism */
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            width: 100%;
            max-width: 800px;
        }

        h2 { text-align: center; margin-bottom: 25px; color: #111827; }

        form { 
            display: grid; 
            gap: 15px; 
            margin-bottom: 30px; 
            background: rgba(255, 255, 255, 0.5);
            padding: 20px;
            border-radius: 12px;
        }

        input { 
            padding: 12px; 
            border: 1px solid rgba(0,0,0,0.1); 
            border-radius: 8px; 
            background: rgba(255, 255, 255, 0.8);
        }

        button { 
            padding: 12px; 
            border-radius: 8px; 
            font-weight: 500; 
            cursor: pointer; 
            transition: 0.3s;
        }

        #btnSubmit { background: var(--primary); color: white; border: none; }
        #btnSubmit:hover { background: var(--primary-hover); transform: scale(1.02); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid rgba(0,0,0,0.05); }
        td { padding: 15px; border-bottom: 1px solid rgba(0,0,0,0.05); }

        .btn-action { padding: 6px 12px; font-size: 13px; border: none; color: white; margin-right: 5px; }
        .btn-edit { background: #F59E0B; }
        .btn-delete { background: var(--danger); }
        
        .badge {
            background: #E0E7FF; 
            color: #3730A3; 
            padding: 4px 8px; 
            border-radius: 6px; 
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🏥 Rekam Medis Pasien</h2>
        
        <form id="formPasien">
            <input type="hidden" id="indexPasien">
            <input type="text" id="nama" placeholder="Nama Pasien" required>
            <input type="number" id="umur" placeholder="Umur" required>
            <input type="text" id="diagnosa" placeholder="Diagnosa" required>
            <button type="submit" id="btnSubmit">Simpan Data</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>Pasien</th>
                    <th>Umur</th>
                    <th>Diagnosa</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tabelPasien"></tbody>
        </table>
    </div>

    <script src="script.js"></script>
    <script>
        // Override renderTable biar match style baru
        function renderTable() {
            const tbody = document.getElementById('tabelPasien');
            tbody.innerHTML = '';
            dataPasien.forEach((pasien, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${pasien.nama}</strong></td>
                        <td>${pasien.umur} Thn</td>
                        <td><span class="badge">${pasien.diagnosa}</span></td>
                        <td>
                            <button class="btn-edit btn-action" onclick="editData(${index})">Edit</button>
                            <button class="btn-delete btn-action" onclick="hapusData(${index})">Hapus</button>
                        </td>
                    </tr>
                `;
            });
        }
        renderTable();
    </script>
</body>
</html>
